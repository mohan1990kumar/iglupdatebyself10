<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bharat Gas LPG ID Checker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            font-size: 28px;
            font-weight: 700;
        }

        .header .subtitle {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .input-section {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .input-group input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group button {
            padding: 12px 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .input-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .input-group button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .example-tags {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .example-tag {
            background: #e9ecef;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: #495057;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .example-tag:hover {
            background: #667eea;
            color: white;
        }

        .status-section {
            margin: 20px 0;
        }

        .loader {
            display: none;
            text-align: center;
            padding: 20px;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 40px;
            height: 40px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .result-card {
            display: none;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            animation: slideUp 0.4s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-card.active {
            display: block;
        }

        .result-card.success {
            border-color: #28a745;
            background: #f0fff4;
        }

        .result-card.error {
            border-color: #dc3545;
            background: #fff5f5;
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e9ecef;
        }

        .result-header .status-badge {
            padding: 4px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
        }

        .status-badge.success {
            background: #28a745;
            color: white;
        }

        .status-badge.error {
            background: #dc3545;
            color: white;
        }

        .result-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .detail-item {
            background: #f8f9fa;
            padding: 10px 14px;
            border-radius: 8px;
        }

        .detail-item .label {
            font-size: 12px;
            color: #6c757d;
            text-transform: uppercase;
            font-weight: 600;
        }

        .detail-item .value {
            font-size: 16px;
            font-weight: 500;
            color: #333;
            margin-top: 4px;
            word-break: break-all;
        }

        .detail-item .value.highlight {
            color: #28a745;
            font-weight: 600;
        }

        .detail-item .value.missing {
            color: #dc3545;
            font-style: italic;
        }

        .result-actions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #e9ecef;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn-secondary {
            padding: 8px 16px;
            background: #6c757d;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .history-section {
            margin-top: 20px;
        }

        .history-section h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .history-list {
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            background: #f8f9fa;
            padding: 8px 12px;
            border-radius: 6px;
            margin-bottom: 6px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item .badge {
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge.valid {
            background: #28a745;
            color: white;
        }

        .badge.invalid {
            background: #dc3545;
            color: white;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            .result-details {
                grid-template-columns: 1fr;
            }

            .input-group {
                flex-direction: column;
            }

            .input-group input {
                min-width: 100%;
            }

            .input-group button {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Bharat Gas LPG Checker</h1>
            <p class="subtitle">Check LPG ID validity and consumer details</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="lpgInput" 
                    placeholder="Enter LPG ID (e.g., 20000290)" 
                    aria-label="LPG ID Input"
                />
                <button id="checkBtn">🔍 Check</button>
            </div>
            <div class="example-tags">
                <span class="example-tag" onclick="setExample('20000290')">20000290</span>
                <span class="example-tag" onclick="setExample('20000291')">20000291</span>
                <span class="example-tag" onclick="setExample('20000292')">20000292</span>
                <span class="example-tag" onclick="setExample('20000293')">20000293</span>
                <span style="font-size:12px;color:#6c757d;margin-left:5px;">(Click to test)</span>
            </div>
        </div>

        <div class="status-section">
            <div class="loader" id="loader">
                <div class="spinner"></div>
                <p style="margin-top:10px;color:#6c757d;">Checking LPG ID...</p>
            </div>

            <div class="result-card" id="resultCard">
                <div class="result-header">
                    <span id="resultTitle" style="font-weight:600;font-size:18px;">Result</span>
                    <span class="status-badge" id="statusBadge">Status</span>
                </div>
                <div class="result-details" id="resultDetails">
                    <!-- Dynamically populated -->
                </div>
                <div class="result-actions">
                    <button class="btn-secondary" onclick="copyResult()">📋 Copy Details</button>
                    <button class="btn-secondary" onclick="clearResult()">🗑️ Clear</button>
                </div>
            </div>
        </div>

        <div class="history-section">
            <h3>📜 History</h3>
            <div class="history-list" id="historyList">
                <p style="color:#6c757d;font-size:14px;text-align:center;">No checks performed yet</p>
            </div>
        </div>
    </div>

    <script>
        // Configuration
        const API_URL = 'https://my.ebharatgas.com/bharatgas/UpdateContactNumber/ValidationConsumer';
        
        // Headers (same as Python version)
        const HEADERS = {
            'User-Agent': 'Mozilla/5.0 (Linux; Android 15) AppleWebKit/537.36',
            'x-requested-with': 'XMLHttpRequest',
            'referer': 'https://my.ebharatgas.com/bharatgas/UpdateContactNumber/Index',
            'Cookie': 'myBharatgas:isConsentProvided=true; myBharatgas_AuthToken=Dn/0h/AMJqlH8u4P3nXKPaCIfuS5rrzeiw4ehbJQghuo/AnU1C3RFlYP1IkqLPf8yuu4lkJPAHtV8AyqlrlCuvD5n9SDnbhtY5PilGwb7tt+LKxnoNnuKgPrZcEaJGt4; ASP.NET_SessionId=t2ogzkjewegi3njisyxycuad; lang=en; __RequestVerificationToken=dkvUmeyIae99OFbOU12VeeLz2KGHKebJQ0jevpGHY83meeoyMmJGMwuXMVsZdmBWhyLsC9mk7pUwChUzu-c87dUSoWY9O9007LUCjEU4vhY1; __RequestVerificationToken_L2JoYXJhdGdhcw2=A_JsOmRFmxwZD5f-ZME0XF01nH4sDO3ZenTxl1o4dS4V_cPl_PMOO0lS8OTtcebIza0pIlIDQTlv1KAQDIQmYxdXgcRdexP29yD0ChwWtbo1; RT="z=1&dm=my.ebharatgas.com&si=a6c7fc9d-8bfd-4c08-be12-fe197fcd4cd9&ss=mo4gpv8m&sl=2&tt=r7c&rl=1&nu=1lp5jbpl&cl=5bgp&ld=5bh0&r=12g9p87h&ul=5bh1"'
        };

        // State
        let history = [];
        let isChecking = false;

        // DOM elements
        const lpgInput = document.getElementById('lpgInput');
        const checkBtn = document.getElementById('checkBtn');
        const loader = document.getElementById('loader');
        const resultCard = document.getElementById('resultCard');
        const resultTitle = document.getElementById('resultTitle');
        const statusBadge = document.getElementById('statusBadge');
        const resultDetails = document.getElementById('resultDetails');
        const historyList = document.getElementById('historyList');

        // Event listeners
        checkBtn.addEventListener('click', () => checkLPG());
        lpgInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') checkLPG();
        });

        // Set example ID
        function setExample(id) {
            lpgInput.value = id;
            checkLPG();
        }

        // Main check function
        async function checkLPG() {
            const input = lpgInput.value.trim();
            if (!input) {
                alert('Please enter an LPG ID');
                return;
            }

            if (isChecking) return;
            isChecking = true;
            checkBtn.disabled = true;

            // Show loader
            loader.classList.add('active');
            resultCard.classList.remove('active');

            try {
                // Format LPG ID to 16 digits with leading zeros
                const lpgId = parseInt(input);
                if (isNaN(lpgId) || lpgId < 0) {
                    throw new Error('Invalid LPG ID format');
                }
                const formattedId = String(lpgId).padStart(16, '0');

                // Build request parameters
                const timestamp = Date.now();
                const params = new URLSearchParams({
                    captchaText: 'ET1MK2',
                    mobileNo: '',
                    LPGId: formattedId,
                    consumerNo: '',
                    distributorCode: '',
                    '_': timestamp
                });

                const url = `${API_URL}?${params.toString()}`;

                // Make request
                const response = await fetch(url, {
                    method: 'GET',
                    headers: HEADERS
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const data = await response.json();
                displayResult(data, formattedId);

            } catch (error) {
                displayError(error.message);
            } finally {
                loader.classList.remove('active');
                isChecking = false;
                checkBtn.disabled = false;
            }
        }

        // Display result
        function displayResult(data, lpgId) {
            const isValid = data.IsValid || false;
            const mobile = data.MobileNumber || '';
            const hasMobile = mobile && mobile.trim().length > 0;

            // Update result card
            resultCard.className = 'result-card active ' + (isValid ? 'success' : 'error');
            resultTitle.textContent = isValid ? '✅ Valid Consumer Found!' : '❌ Invalid Consumer';
            statusBadge.textContent = isValid ? 'VALID' : 'INVALID';
            statusBadge.className = 'status-badge ' + (isValid ? 'success' : 'error');

            // Build details
            const details = [
                { label: 'LPG ID', value: lpgId, highlight: true },
                { label: 'Consumer ID', value: data.ConsumerId || 'N/A' },
                { label: 'Consumer Number', value: data.ConsumerNumber || 'N/A' },
                { label: 'Consumer Name', value: data.ConsumerName || 'N/A' },
                { 
                    label: 'Mobile Number', 
                    value: hasMobile ? mobile : 'Not Available',
                    highlight: hasMobile,
                    missing: !hasMobile
                },
                { label: 'Email ID', value: data.emailId || 'Not Available' }
            ];

            resultDetails.innerHTML = details.map(item => `
                <div class="detail-item">
                    <div class="label">${item.label}</div>
                    <div class="value ${item.highlight ? 'highlight' : ''} ${item.missing ? 'missing' : ''}">
                        ${item.value}
                    </div>
                </div>
            `).join('');

            // Add to history
            addHistory(lpgId, isValid, hasMobile);
        }

        // Display error
        function displayError(message) {
            resultCard.className = 'result-card active error';
            resultTitle.textContent = '⚠️ Error';
            statusBadge.textContent = 'ERROR';
            statusBadge.className = 'status-badge error';

            resultDetails.innerHTML = `
                <div class="detail-item" style="grid-column: 1 / -1;">
                    <div class="label">Error Message</div>
                    <div class="value" style="color:#dc3545;">${message}</div>
                </div>
            `;
        }

        // Add to history
        function addHistory(lpgId, isValid, hasMobile) {
            const entry = {
                id: lpgId,
                isValid: isValid,
                hasMobile: hasMobile,
                timestamp: new Date().toLocaleTimeString()
            };

            history.unshift(entry);
            if (history.length > 20) history.pop(); // Keep last 20

            updateHistoryUI();
        }

        // Update history UI
        function updateHistoryUI() {
            if (history.length === 0) {
                historyList.innerHTML = '<p style="color:#6c757d;font-size:14px;text-align:center;">No checks performed yet</p>';
                return;
            }

            historyList.innerHTML = history.map(item => `
                <div class="history-item">
                    <span>${item.id}</span>
                    <span>
                        <span class="badge ${item.isValid ? 'valid' : 'invalid'}">
                            ${item.isValid ? '✅' : '❌'} ${item.isValid ? 'Valid' : 'Invalid'}
                            ${item.isValid ? (item.hasMobile ? '📱' : '📭') : ''}
                        </span>
                        <span style="font-size:11px;color:#6c757d;margin-left:8px;">${item.timestamp}</span>
                    </span>
                </div>
            `).join('');
        }

        // Copy result
        function copyResult() {
            const details = resultDetails.querySelectorAll('.detail-item');
            let text = 'BHARAT GAS LPG CHECK RESULT\n';
            text += '='.repeat(40) + '\n';
            
            details.forEach(item => {
                const label = item.querySelector('.label')?.textContent || '';
                const value = item.querySelector('.value')?.textContent || '';
                text += `${label}: ${value}\n`;
            });

            navigator.clipboard.writeText(text).then(() => {
                alert('✅ Result copied to clipboard!');
            }).catch(() => {
                // Fallback
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                alert('✅ Result copied to clipboard!');
            });
        }

        // Clear result
        function clearResult() {
            resultCard.classList.remove('active');
            lpgInput.value = '';
            lpgInput.focus();
        }

        // Initial focus
        lpgInput.focus();

        console.log('🚀 Bharat Gas LPG Checker loaded successfully!');
        console.log('ℹ️  Enter an LPG ID and click Check to verify.');
    </script>
</body>
</html>
